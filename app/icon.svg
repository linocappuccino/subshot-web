<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4A4E56"/><stop offset="100%" stop-color="#1C1E22"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#54585F"/><stop offset="100%" stop-color="#2A2C31"/>
    </linearGradient>
    <linearGradient id="stripe" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/><stop offset="100%" stop-color="#C7D3E0"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4F5F8"/><stop offset="55%" stop-color="#DDE1EA"/><stop offset="100%" stop-color="#C3C9D6"/>
    </linearGradient>
    <radialGradient id="sheen" cx="30%" cy="10%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18"/><stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="squircle"><rect x="0" y="0" width="1024" height="1024" rx="228" ry="228"/></clipPath>
    <clipPath id="barClip"><rect x="0" y="0" width="1024" height="212" rx="228" ry="228"/></clipPath>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="panelShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <g clip-path="url(#squircle)">
    <rect width="1024" height="1024" fill="url(#body)"/>
    <g clip-path="url(#barClip)">
      <rect width="1024" height="212" fill="url(#stripe)"/>
      <g fill="url(#bar)">
        <rect x="20" y="0" width="66" height="212"/><rect x="156" y="0" width="66" height="212"/>
        <rect x="292" y="0" width="66" height="212"/><rect x="428" y="0" width="66" height="212"/>
        <rect x="564" y="0" width="66" height="212"/><rect x="700" y="0" width="66" height="212"/>
        <rect x="836" y="0" width="66" height="212"/><rect x="972" y="0" width="66" height="212"/>
      </g>
    </g>
    <rect x="0" y="204" width="1024" height="10" fill="#000000" opacity="0.4"/>
    <g filter="url(#panelShadow)">
      <rect x="120" y="310" width="784" height="580" rx="60" fill="url(#panel)"/>
    </g>
    <rect x="120" y="310" width="784" height="580" rx="60" fill="none" stroke="#000000" stroke-opacity="0.25" stroke-width="4"/>
    <g filter="url(#softShadow)" transform="translate(512,600) skewX(-8) translate(-512,-600)">
      <text x="512" y="600" font-family="Arial, 'Helvetica Neue', sans-serif" font-weight="800" font-size="260"
            text-anchor="middle" dominant-baseline="middle" fill="#1C1E22" letter-spacing="2">SUB</text>
    </g>
    <rect width="1024" height="1024" fill="url(#sheen)"/>
  </g>
</svg>
